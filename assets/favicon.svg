<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="PayPulse">
  <title>PayPulse</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#1f1b4f"/>
      <stop offset="100%" stop-color="#0a1a2f"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#00e676"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded-square background -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="0.5">
    <path d="M2 22 H62 M2 42 H62 M22 2 V62 M42 2 V62"/>
  </g>

  <!-- ECG-style pulse line, centred -->
  <path d="M6 34 L18 34 L22 24 L26 44 L30 20 L34 48 L38 34 L58 34"
        fill="none"
        stroke="url(#pulse)"
        stroke-width="3.2"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- Dollar glyph top-right badge -->
  <circle cx="48" cy="18" r="9" fill="#ffd54a"/>
  <text x="48" y="22.5" text-anchor="middle"
        font-family="SF Pro Rounded, -apple-system, Helvetica, Arial, sans-serif"
        font-weight="800" font-size="13" fill="#1f1b4f">$</text>
</svg>
